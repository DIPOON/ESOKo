kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraMounts:
      - hostPath: /mnt/d/ESOKo/WebProject
        containerPath: /project
    extraPortMappings:
      - containerPort: 30080
        hostPort: 80
      - containerPort: 30306
        hostPort: 3306
  - role: worker
    extraMounts:
      - hostPath: /mnt/d/ESOKo/WebProject
        containerPath: /project